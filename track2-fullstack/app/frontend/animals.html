<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animals — FarmTracker</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>FarmTracker</h1>
    <nav>
      <a href="index.html">Paddocks</a>
      <a href="animals.html" class="active">Animals</a>
    </nav>
  </header>
  <main>
    <div class="page-header">
      <h2>Animals</h2>
    </div>
    <table>
      <thead>
        <tr>
          <th>Tag</th>
          <th>Name</th>
          <th>Breed</th>
          <th>Paddock</th>
          <th>Latest Health Event</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="animals-body">
        <tr><td colspan="6" class="loading">Loading…</td></tr>
      </tbody>
    </table>
    <div class="pagination">
      <button id="prev-btn" onclick="changePage(-1)" disabled>Previous</button>
      <span id="page-info">Page 1</span>
      <button id="next-btn" onclick="changePage(1)">Next</button>
    </div>
  </main>
  <script src="app.js"></script>
  <script>
    let currentPage = 0;
    const LIMIT = 5;

    async function loadAnimals() {
      const animals = await api.get(`/animals?page=${currentPage}&limit=${LIMIT}`);
      const tbody = document.getElementById('animals-body');

      if (!animals.length) {
        tbody.innerHTML = '<tr><td colspan="6" class="empty">No animals found.</td></tr>';
        document.getElementById('next-btn').disabled = true;
        return;
      }

      tbody.innerHTML = animals.map(a => {
        const event = a.latest_health_event
          ? `${a.latest_health_event.event_type} (${a.latest_health_event.date})`
          : '—';
        return `
          <tr>
            <td>${esc(a.tag_number)}</td>
            <td>${esc(a.name)}</td>
            <td>${esc(a.breed ?? '—')}</td>
            <td>${esc(a.paddock_id ?? '—')}</td>
            <td>${esc(event)}</td>
            <td><a href="animal-detail.html?id=${a.id}">View</a></td>
          </tr>
        `;
      }).join('');

      document.getElementById('page-info').textContent = `Page ${currentPage + 1}`;
      document.getElementById('prev-btn').disabled = currentPage === 0;
      document.getElementById('next-btn').disabled = animals.length < LIMIT;
    }

    function changePage(dir) {
      currentPage = Math.max(0, currentPage + dir);
      loadAnimals();
    }

    loadAnimals();
  </script>
</body>
</html>
