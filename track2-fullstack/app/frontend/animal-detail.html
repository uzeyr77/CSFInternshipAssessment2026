<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animal — FarmTracker</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>FarmTracker</h1>
    <nav>
      <a href="index.html">Paddocks</a>
      <a href="animals.html" class="active">Animals</a>
    </nav>
  </header>
  <main>
    <a href="animals.html" class="back-link">← Back to Animals</a>
    <div id="animal-detail"><p class="loading">Loading…</p></div>

    <section id="health-section" style="display:none">
      <h3>Health Events</h3>
      <table>
        <thead>
          <tr><th>Date</th><th>Type</th><th>Vet</th><th>Notes</th></tr>
        </thead>
        <tbody id="events-body"></tbody>
      </table>

      <h4>Log Health Event</h4>
      <form id="event-form">
        <label>Type
          <select name="event_type" required>
            <option value="vaccination">Vaccination</option>
            <option value="checkup">Checkup</option>
            <option value="treatment">Treatment</option>
            <option value="injury">Injury</option>
          </select>
        </label>
        <label>Date <input type="date" name="date" required></label>
        <label>Vet <input type="text" name="vet_name" placeholder="Optional"></label>
        <label>Notes <input type="text" name="notes" placeholder="Optional"></label>
        <button type="submit">Log Event</button>
      </form>
    </section>
  </main>
  <script src="app.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const animalId = params.get('id');

    async function load() {
      const animal = await api.get(`/animals/${animalId}`);

      document.title = `${animal.name} — FarmTracker`;
      document.getElementById('animal-detail').innerHTML = `
        <div class="animal-header">
          <h2>${animal.name}<span class="tag">${animal.tag_number}</span></h2>
        </div>
        <dl>
          <dt>Breed</dt>       <dd>${animal.breed ?? '—'}</dd>
          <dt>Date of Birth</dt><dd>${animal.date_of_birth ?? '—'}</dd>
          <dt>Paddock</dt>     <dd>${animal.paddock_id ?? 'Unassigned'}</dd>
        </dl>
      `;

      document.getElementById('health-section').style.display = 'block';
      await loadEvents();
    }

    async function loadEvents() {
      const events = await api.get(`/animals/${animalId}/health-events`);
      const tbody = document.getElementById('events-body');
      tbody.innerHTML = events.length
        ? events.map(e => `
            <tr>
              <td>${e.date}</td>
              <td>${e.event_type}</td>
              <td>${e.vet_name ?? '—'}</td>
              <td>${e.notes ?? '—'}</td>
            </tr>
          `).join('')
        : '<tr><td colspan="4" class="empty">No events recorded.</td></tr>';
    }

    document.getElementById('event-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const data = Object.fromEntries(new FormData(e.target));
      await api.post(`/animals/${animalId}/health-events`, data);
      e.target.reset();
      await loadEvents();
    });

    load();
  </script>
</body>
</html>
