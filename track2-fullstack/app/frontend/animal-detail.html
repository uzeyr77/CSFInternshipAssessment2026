<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animal — FarmTracker</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>FarmTracker</h1>
    <nav>
      <a href="index.html">Paddocks</a>
      <a href="animals.html" class="active">Animals</a>
    </nav>
  </header>
  <main>
    <a href="animals.html" class="back-link">← Back to Animals</a>
    <div id="animal-detail"><p class="loading">Loading…</p></div>

    <section id="health-section" style="display:none">
      <h3>Health Events</h3>
      <table>
        <thead>
          <tr><th>Date</th><th>Type</th><th>Vet</th><th>Notes</th></tr>
        </thead>
        <tbody id="events-body"></tbody>
      </table>

      <h4>Log Health Event</h4>
      <form id="event-form">
        <label>Type
          <select name="event_type" required>
            <option value="vaccination">Vaccination</option>
            <option value="checkup">Checkup</option>
            <option value="treatment">Treatment</option>
            <option value="injury">Injury</option>
          </select>
        </label>
        <label>Date <input type="date" name="date" required></label>
        <label>Vet <input type="text" name="vet_name" placeholder="Optional"></label>
        <label>Notes <input type="text" name="notes" placeholder="Optional"></label>
        <button type="submit">Log Event</button>
      </form>
    </section>
    <section id="weight-section" style="display:none">
      <h3>Weight History</h3>
      <p id="latest-weight" class="latest"></p>
      <table>
        <thead>
          <tr><th>Date</th><th>Weight (kg)</th><th>Notes</th></tr>
        </thead>
        <tbody id="weights-body"></tbody>
      </table>

      <h4>Log Weight</h4>
      <form id="weight-form">
        <label>Date <input type="date" name="date" required></label>
        <label>Weight (kg) <input type="number" step="0.1" min="0.1" name="weight_kg" required></label>
        <label>Notes <input type="text" name="notes" placeholder="Optional"></label>
        <button type="submit">Log Weight</button>
      </form>
    </section>

  </main>
  <script src="app.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const animalId = params.get('id');
    
    async function load() {
      const animal = await api.get(`/animals/${animalId}`);

      document.title = `${animal.name} — FarmTracker`;
      document.getElementById('animal-detail').innerHTML = `
        <div class="animal-header">
          <h2>${esc(animal.name)}<span class="tag">${esc(animal.tag_number)}</span></h2>
        </div>
        <dl>
          <dt>Breed</dt>       <dd>${esc(animal.breed ?? '—')}</dd>
          <dt>Date of Birth</dt><dd>${esc(animal.date_of_birth ?? '—')}</dd>
          <dt>Paddock</dt>     <dd>${esc(animal.paddock_id ?? 'Unassigned')}</dd>
        </dl>
      `;

      document.getElementById('health-section').style.display = 'block';
      await loadEvents();
      document.getElementById('weight-section').style.display = 'block';
      await loadWeights();
    }

    async function loadEvents() {
      const events = await api.get(`/animals/${animalId}/health-events`);
      const tbody = document.getElementById('events-body');
      tbody.innerHTML = events.length
        ? events.map(e => `
            <tr>
              <td>${esc(e.date)}</td>
              <td>${esc(e.event_type)}</td>
              <td>${esc(e.vet_name ?? '—')}</td>
              <td>${esc(e.notes ?? '—')}</td>
            </tr>
          `).join('')
        : '<tr><td colspan="4" class="empty">No events recorded.</td></tr>';
    }

    async function loadWeights() {
      const weights = await api.get(`/animals/${animalId}/weights`);
      const latest = document.getElementById('latest-weight');
      const tbody = document.getElementById('weights-body');

      if (weights.length) {
        latest.textContent = `Latest: ${weights[0].weight_kg} kg on ${weights[0].date}`;
        tbody.innerHTML = weights.map(w => `
          <tr>
            <td>${esc(w.date)}</td>
            <td>${esc(w.weight_kg)}</td>
            <td>${esc(w.notes ?? '—')}</td>
          </tr>
        `).join('');
      } else {
        latest.textContent = 'No weight records yet';
        tbody.innerHTML = '<tr><td colspan="3" class="empty">No weights recorded.</td></tr>';
      }
    }

    document.getElementById('event-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const data = Object.fromEntries(new FormData(e.target));
      await api.post(`/animals/${animalId}/health-events`, data);
      e.target.reset();
      await loadEvents();
    });

    document.getElementById('weight-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const data = Object.fromEntries(new FormData(e.target));
      data.weight_kg = parseFloat(data.weight_kg);
      await api.post(`/animals/${animalId}/weights`, data);
      e.target.reset();
      await loadWeights();
    });

    load();
  </script>
</body>
</html>
